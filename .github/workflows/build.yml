name: Backend DevSecOps Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/workflows/**"
      - "**/*.md"
      
permissions:
  contents: write
  packages: write

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_NAME: linker-backend
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
  
jobs:
# -----------------------------------------
# JOB 1: Notify Start
# -----------------------------------------
  notify-start:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_COLOR: '#3273DC'
          SLACK_MESSAGE: "🚀 Backend Build Started | Run #${{ github.run_number }} | Commit: ${{ github.sha }}"
          SLACK_TITLE: Pipeline Initialized
          SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}

# -----------------------------------------
# JOB 2: Build → Scan → Push
# -----------------------------------------
  build-scan-push:
    needs: notify-start
    runs-on: ubuntu-latest

    steps:
# -----------------------------------------
# Checkout
# -----------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

# -----------------------------------------
# Setup Node + pnpm cache
# -----------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

# -----------------------------------------
# Install Dependencies
# -----------------------------------------
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

# -----------------------------------------
# Setup Docker
# -----------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

# -----------------------------------------
# Login Docker Hub
# -----------------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

# -----------------------------------------
# Generate Tags
# -----------------------------------------
      - name: Generate Version Tag
        id: vars
        run: |
          VERSION_MINOR=$((5 + ${{ github.run_number }}))
          echo "tag=1.${VERSION_MINOR}" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

# -----------------------------------------
# Build Image (LOCAL ONLY)
# -----------------------------------------
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# -----------------------------------------
# Scan Image (FAIL ON CRITICAL)
# -----------------------------------------
      - name: Scan Image (Trivy)
        id: trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}'
          format: table
          output: trivy-report.txt
          exit-code: '1'
          severity: CRITICAL
          scanners: vuln

# -----------------------------------------
# Upload Report
# -----------------------------------------
      - name: Upload Trivy Scan Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-trivy-report
          path: trivy-report.txt
          if-no-files-found: ignore

# -----------------------------------------
# Slack Scan Summary (NEW)
# -----------------------------------------
      - name: Send Trivy Summary to Slack
        if: always()
        run: |
          CRITICAL=$(grep -E "CRITICAL" trivy-report.txt | wc -l || true)
          HIGH=$(grep -E "HIGH" trivy-report.txt | wc -l || true)

          PAYLOAD=$(cat <<EOF
          {
            "text": "🔍 *Backend Security Scan*\nImage: ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}\nCRITICAL: $CRITICAL\nHIGH: $HIGH"
          }
          EOF
          )

          curl -X POST -H "Content-type: application/json" \
            --data "$PAYLOAD" \
            ${{ env.SLACK_WEBHOOK }}

# -----------------------------------------
# Commit Report (NEW)
# -----------------------------------------
      - name: Commit Trivy Report to Repo
        if: always()
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          mkdir -p security-reports
          DATE=$(date +'%Y-%m-%d-%H-%M')
          [ -f trivy-report.txt ] && mv trivy-report.txt security-reports/backend-trivy-$DATE.txt || echo "No report found"

          git add security-reports/
          git commit -m "chore: add backend trivy report ($DATE)" || echo "No changes to commit"
          git push

# -----------------------------------------
# Push Image (ONLY IF SAFE)
# -----------------------------------------
      - name: Push Docker Image
        if: ${{ success() }}
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }} ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}

# -----------------------------------------
# Final Slack Notification
# -----------------------------------------
      - name: Send Final Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_MESSAGE: "Backend Build Result: ${{ job.status }} | Tag: ${{ steps.vars.outputs.tag }}"
          SLACK_TITLE: Pipeline Complete
          SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}
